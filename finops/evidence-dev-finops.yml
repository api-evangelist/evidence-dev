meters:
- name: cloud_seats
  description: Evidence Cloud user seats billed per user per month by plan (Team/Pro/Enterprise).
  unit: users
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ai_credits_included
  description: Monthly AI-credit allowance bundled per user (1,000 Team / 3,000 Pro / custom Enterprise).
  unit: ai_credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ai_credits_overage
  description: AI credits consumed beyond the included allowance, billed at $0.01 per credit.
  unit: ai_credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: self_hosting_compute
  description: External hosting/CDN cost for self-hosted open-source deployments (not billed by Evidence).
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - host
- name: upstream_warehouse_queries
  description: Cost of queries run against connected upstream data warehouses (billed by those providers).
  unit: queries
  aggregation: sum
  dimensions:
  - account
  - source
principles:
- name: Visibility
  description: Track Evidence Cloud seat counts and AI-credit burn; separately track upstream warehouse and hosting spend driven by Evidence usage.
- name: Allocation
  description: Map seats and projects to teams/cost centers; tag self-hosted deployments by environment.
- name: Optimization
  description: Use the free MIT self-hosted framework where managed hosting is not needed; right-size AI-credit usage to avoid overage; cache and schedule syncs to limit warehouse query cost.
- name: Accountability
  description: Review seat and AI-credit consumption monthly against budget; assign owners per project and deployment.
