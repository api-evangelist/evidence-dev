description: >-
  FinOps view of Evidence spend. The open-source framework (Evidence core, including
  the Universal SQL / DuckDB query layer) is MIT-licensed and free; its only direct
  costs are the self-hosting compute/CDN you choose (Netlify, Vercel, own server) plus
  the cost of the upstream data warehouses you query. Evidence Cloud is the managed
  product and bills seat-based per user/month (Team $15, Pro $25, Enterprise custom)
  with bundled monthly AI-credit allowances and metered AI-credit overage at $0.01
  per credit. Because Evidence is a framework rather than a metered REST API, there
  are no per-token or per-request inference charges to model.
notes: >-
  Evidence Cloud tier prices and AI-credit allowances are subject to change; verify
  against https://evidence.dev/pricing during reconciliation. Self-hosting costs are
  external (hosting provider + data warehouse) and not billed by Evidence.
